<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KRTI 人格测试 - 假面骑士性格诊断</title>
<style>
/* ========== 全局重置与基础样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

/* ========== 页面容器 ========== */
.page { display: none; max-width: 480px; margin: 0 auto; padding: 20px 16px; }
.page.active { display: block; }

/* ========== 欢迎页 ========== */
.welcome-hero {
  text-align: center;
  padding: 60px 20px 40px;
}
.welcome-hero h1 {
  font-size: 2.2em;
  font-weight: 800;
  background: linear-gradient(135deg, #E3001B, #F39C12, #8E44AD);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.welcome-hero .subtitle {
  font-size: 1.1em;
  color: #86868b;
  margin-bottom: 32px;
}
.welcome-hero .desc {
  font-size: 0.95em;
  color: #6e6e73;
  max-width: 360px;
  margin: 0 auto 40px;
  line-height: 1.8;
}
.dim-preview {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 0 auto 40px;
  max-width: 360px;
}
.dim-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  text-align: center;
}
.dim-card .dim-label {
  font-size: 0.8em;
  color: #86868b;
  margin-bottom: 6px;
}
.dim-card .dim-poles {
  font-size: 0.85em;
  color: #1d1d1f;
  font-weight: 600;
}

/* ========== 按钮 ========== */
.btn-primary {
  display: block;
  width: 100%;
  max-width: 360px;
  margin: 0 auto;
  padding: 16px 32px;
  background: linear-gradient(135deg, #E3001B, #C0392B);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(227,0,27,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(227,0,27,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
  display: inline-block;
  padding: 12px 28px;
  background: #fff;
  color: #1d1d1f;
  border: 2px solid #e5e5ea;
  border-radius: 12px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary:hover { border-color: #E3001B; color: #E3001B; }

/* ========== 答题页 ========== */
.progress-bar-container {
  position: sticky;
  top: 0;
  background: #f5f5f7;
  padding: 12px 0 16px;
  z-index: 10;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.85em;
  color: #86868b;
}
.progress-track {
  width: 100%;
  height: 6px;
  background: #e5e5ea;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #E3001B, #F39C12);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.question-section {
  margin-top: 8px;
}
.question-category {
  display: inline-block;
  padding: 4px 12px;
  background: #f0f0f5;
  border-radius: 20px;
  font-size: 0.75em;
  color: #86868b;
  margin-bottom: 16px;
}
.question-text {
  font-size: 1.2em;
  font-weight: 700;
  line-height: 1.7;
  margin-bottom: 24px;
  color: #1d1d1f;
}
.options-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.option-btn {
  display: block;
  width: 100%;
  padding: 16px 20px;
  background: #fff;
  border: 2px solid #e5e5ea;
  border-radius: 14px;
  font-size: 0.95em;
  color: #1d1d1f;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.6;
}
.option-btn:hover {
  border-color: #E3001B;
  background: #fff5f5;
  transform: translateX(4px);
}
.option-btn:active { transform: translateX(2px); }

/* ========== 结果页 ========== */
.result-hero {
  position: relative;
  width: 100%;
  height: 280px;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 24px;
  background: #1d1d1f;
}
.result-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}
.result-hero .overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 24px 20px 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.75));
  color: #fff;
}
.result-hero .rider-type-label {
  font-size: 0.8em;
  opacity: 0.8;
  margin-bottom: 4px;
}
.result-hero .rider-name {
  font-size: 1.8em;
  font-weight: 800;
  margin-bottom: 2px;
}
.result-hero .rider-tag {
  font-size: 1em;
  opacity: 0.9;
}
.result-section {
  background: #fff;
  border-radius: 20px;
  padding: 24px 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.result-section h2 {
  font-size: 1.05em;
  font-weight: 700;
  margin-bottom: 20px;
  color: #1d1d1f;
  text-align: center;
}
.dim-bar-group {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.dim-bar-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.dim-bar-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.8em;
  color: #6e6e73;
}
.dim-bar-labels .dim-a { color: #E3001B; font-weight: 600; }
.dim-bar-labels .dim-b { color: #2C3E50; font-weight: 600; }
.dim-bar-track {
  width: 100%;
  height: 10px;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}
.dim-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 1s ease;
}
.dim-bar-fill.热情 { background: linear-gradient(90deg, #E3001B, #F39C12); }
.dim-bar-fill.理想 { background: linear-gradient(90deg, #8E44AD, #F39C12); }
.dim-bar-fill.社交 { background: linear-gradient(90deg, #E74C3C, #F1C40F); }
.dim-bar-fill.行动 { background: linear-gradient(90deg, #E67E22, #2ECC71); }
.dim-bar-percent {
  text-align: center;
  font-size: 0.75em;
  color: #86868b;
  font-weight: 600;
}
.quote-box {
  font-style: italic;
  font-size: 0.95em;
  color: #6e6e73;
  text-align: center;
  padding: 16px;
  border-left: 3px solid #E3001B;
  background: #fafafa;
  border-radius: 0 12px 12px 0;
  line-height: 1.8;
}
.description-text {
  font-size: 0.95em;
  color: #3a3a3c;
  line-height: 1.9;
}
.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 8px;
}
.result-actions .btn-primary {
  max-width: 200px;
  font-size: 0.95em;
  padding: 14px 24px;
}

/* ========== 匹配度标签 ========== */
.match-badge {
  display: inline-block;
  padding: 4px 12px;
  background: linear-gradient(135deg, #E3001B, #C0392B);
  color: #fff;
  border-radius: 20px;
  font-size: 0.75em;
  font-weight: 600;
  margin-top: 8px;
}

/* ========== 过渡动画 ========== */
.fade-in {
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== 响应式 ========== */
@media (max-width: 480px) {
  /* 欢迎页 */
  .page { padding: 16px 12px; }
  .welcome-hero { padding: 40px 12px 30px; }
  .welcome-hero h1 { font-size: 1.8em; }
  .welcome-hero .subtitle { font-size: 1em; }
  .welcome-hero .desc { font-size: 0.9em; }
  .dim-preview { max-width: 100%; gap: 8px; }
  .dim-card { padding: 12px 8px; }
  .dim-card .dim-poles { font-size: 0.75em; }

  /* 按钮 */
  .btn-primary { padding: 14px 24px; font-size: 1em; border-radius: 12px; }
  .btn-secondary { padding: 10px 20px; font-size: 0.9em; }

  /* 答题页 */
  .question-text { font-size: 1.1em; }
  .option-btn { padding: 14px 16px; font-size: 0.9em; border-radius: 12px; }

  /* 结果页 */
  .result-hero { height: 240px; border-radius: 16px; margin-bottom: 16px; }
  .result-hero .overlay { padding: 20px 16px 16px; }
  .result-hero .rider-name { font-size: 1.5em; }
  .result-hero .rider-tag { font-size: 0.9em; }
  .result-section { padding: 20px 16px; margin-bottom: 12px; border-radius: 16px; }
  .result-section h2 { font-size: 1em; margin-bottom: 16px; }
  .dim-bar-group { gap: 14px; }
  .dim-bar-labels { font-size: 0.75em; }
  .dim-bar-track { height: 8px; }
  .quote-box { font-size: 0.9em; padding: 12px; }
  .description-text { font-size: 0.9em; }
  .result-actions { gap: 8px; }
  .result-actions .btn-primary { max-width: 160px; font-size: 0.85em; padding: 12px 16px; }
  .result-actions .btn-secondary { font-size: 0.85em; padding: 10px 16px; }
}

@media (max-width: 340px) {
  .welcome-hero h1 { font-size: 1.6em; }
  .result-hero { height: 200px; }
  .result-hero .rider-name { font-size: 1.3em; }
  .option-btn { padding: 12px 14px; font-size: 0.85em; }
}

/* ========== 隐藏的Canvas ========== */
#shareCanvas { display: none; }
</style>
</head>

<!-- ==================== 结果页 ==================== -->
<div id="resultPage" class="page">

</div>

  var memePicked = shuffledMeme.slice(0, 3);
  // 合并并打乱顺序
  currentQuestions = normalPicked.concat(memePicked).sort(function() { return Math.random() - 0.5; });
  currentQuestion = 0;
  dimScores = { E: 0, I: 0, N: 0, S: 0, F: 0, T: 0, P: 0, J: 0 };
  showPage('quizPage');
  renderQuestion();
}

// ==================== 渲染当前题目 ====================
function renderQuestion() {
  var q = currentQuestions[currentQuestion];
  var total = currentQuestions.length;

  // 更新进度条
  document.getElementById('progressText').textContent = '第 ' + (currentQuestion + 1) + ' / ' + total + ' 题';
  document.getElementById('progressFill').style.width = ((currentQuestion + 1) / total * 100) + '%';

  // 更新分类标签
  var catShort = q.category.replace('场景', '').replace('和', '');
  var catEl = document.getElementById('categoryText');
  if (catEl) catEl.textContent = catShort;

  // 更新题目文本
  document.getElementById('questionText').textContent = q.text || q.question || '';

  // 渲染选项按钮
  var optionsHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    var label = ['A', 'B', 'C', 'D'][i];
    optionsHtml += '<button class="option-btn" onclick="selectOption(' + i + ')">';
    optionsHtml += '<strong>' + label + '.</strong> ' + opt.text;
    optionsHtml += '</button>';
  }
  document.getElementById('optionsList').innerHTML = optionsHtml;

  // 添加淡入动画
  var section = document.getElementById('questionSection');
  section.classList.remove('fade-in');
  // 触发重排以重新播放动画
  void section.offsetWidth;
  section.classList.add('fade-in');
}

// ==================== 选择选项 ====================
function selectOption(index) {
  var q = currentQuestions[currentQuestion];
  var opt = q.options[index];

  // 累加维度分数
  var scores = opt.scores;
  for (var key in scores) {
    if (dimScores.hasOwnProperty(key)) {
      dimScores[key] += scores[key];
    }
  }

  currentQuestion++;

  if (currentQuestion < currentQuestions.length) {
    // 下一题
    renderQuestion();
  } else {
    // 测试完成，计算结果
    showResult();
  }
}

// ==================== 计算维度百分比 ====================
function getDimPercent(dimA, dimB) {
  var total = dimScores[dimA] + dimScores[dimB];
  if (total === 0) return 50;
  return Math.round(dimScores[dimA] / total * 100);
}

// ==================== 匹配最接近的骑士 ====================
function matchRider() {
  var userE = getDimPercent('E', 'I');
  var userN = getDimPercent('N', 'S');
  var userF = getDimPercent('F', 'T');
  var userP = getDimPercent('P', 'J');

  var minDist = Infinity;
  var matched = null;

  for (var key in riderProfiles) {
    var profile = riderProfiles[key];
    var dist = Math.abs(userE - profile.E) +
               Math.abs(userN - profile.N) +
               Math.abs(userF - profile.F) +
               Math.abs(userP - profile.P);
    if (dist < minDist) {
      minDist = dist;
      matched = key;
    }
  }

  // 计算匹配度（距离越小匹配度越高，最大距离400）
  var matchPercent = Math.max(0, Math.round((1 - minDist / 400) * 100));

  return { key: matched, matchPercent: matchPercent };
}

// ==================== 构建维度进度条HTML ====================
function buildDimBar(dimClass, labelA, labelB, percent) {
  var html = '';
  html += '<div class="dim-bar-item">';
  html += '  <div class="dim-bar-labels">';

  html += '  </div>';
  html += '  <div class="dim-bar-percent">' + percent + '%</div>';
  html += '</div>';
  return html;
}

// 调试函数：显示所有骑士图片

function generateShareImage() {
  var result = matchRider();
  var riderData = null;
  for (var i = 0; i < riders.length; i++) {
    if (riders[i].key === result.key) {
      riderData = riders[i];
      break;
    }
  }
  if (!riderData) return;

  var userE = getDimPercent('E', 'I');
  var userN = getDimPercent('N', 'S');
  var userF = getDimPercent('F', 'T');
  var userP = getDimPercent('P', 'J');

  // 先加载骑士图片，再绘制Canvas（优先用Base64缓存）
  var imgSrc = riderData.image || '';
  var cachedBase64 = (typeof riderImagesBase64 !== 'undefined' && riderImagesBase64[riderData.key]) || riderImageCache[riderData.key] || '';
  if (cachedBase64.length > 0) {
    // 使用预加载的Base64图片，无跨域问题
    var img = new Image();
    img.onload = function() {
      drawShareCanvas(riderData, result, userE, userN, userF, userP, img);
    };
    img.onerror = function() {
      drawShareCanvas(riderData, result, userE, userN, userF, userP, null);
    };
    img.src = cachedBase64;
  } else if (imgSrc.length > 0) {
    var img2 = new Image();
    img2.crossOrigin = 'anonymous';
    img2.onload = function() {
      drawShareCanvas(riderData, result, userE, userN, userF, userP, img2);
    };
    img2.onerror = function() {
      drawShareCanvas(riderData, result, userE, userN, userF, userP, null);
    };
    img2.src = imgSrc;
  } else {
    drawShareCanvas(riderData, result, userE, userN, userF, userP, null);
  }
}

function drawShareCanvas(riderData, result, userE, userN, userF, userP, riderImg) {
  var canvas = document.getElementById('shareCanvas');
  var ctx = canvas.getContext('2d');
  var W = 750, H = 1334;

  // 清空画布
  ctx.clearRect(0, 0, W, H);

  // 背景
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // 顶部横幅
  ctx.fillStyle = '#1d1d1f';
  ctx.fillRect(0, 0, W, 70);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('KRTI 人格测试', W / 2, 46);

  // 骑士图片区域
  var imgY = 90;
  var imgH = 320;

  if (riderImg) {
    // 绘制骑士图片（裁剪顶部，显示头部）
    var srcW = riderImg.naturalWidth;
    var srcH = riderImg.naturalHeight;
    var cropH = Math.min(srcH, srcH * 0.6);
    var cropY = 0;
    var drawW = W;
    var drawH = imgH;
    // 居中裁剪
    var srcRatio = cropH / srcW;
    var dstRatio = drawH / drawW;
    if (srcRatio > dstRatio) {
      drawW = drawH * srcW / cropH;
    } else {
      drawH = drawW * cropH / srcW;
    }
    var offsetX = (W - drawW) / 2;
    ctx.drawImage(riderImg, 0, cropY, srcW, cropH, offsetX, imgY, drawW, drawH);
    // 底部渐变遮罩
    var grad = ctx.createLinearGradient(0, imgY + imgH - 80, 0, imgY + imgH);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, imgY + imgH - 80, W, 80);
    // 骑士名（图片底部）
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 36px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('假面骑士 ' + riderData.rider, W / 2, imgY + imgH - 20);
  } else {
    // 没有图片，用颜色块+emoji代替
    ctx.fillStyle = riderData.color;
    ctx.fillRect(0, imgY, W, imgH);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 60px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(riderData.emoji, W / 2, imgY + 120);
    ctx.font = 'bold 36px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText('假面骑士 ' + riderData.rider, W / 2, imgY + 180);
    ctx.font = '24px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText(riderData.emoji + ' ' + riderData.tag, W / 2, imgY + 220);
    ctx.font = 'bold 18px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText('匹配度 ' + result.matchPercent + '%', W / 2, imgY + 258);
  }

  // 骑士名和标签（图片下方）
  if (riderImg) {
    var infoY = imgY + imgH + 15;
    ctx.fillStyle = '#3a3a3c';
    ctx.font = 'bold 28px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(riderData.rider + ' ' + riderData.riderEn, W / 2, infoY);
    ctx.font = '18px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = riderData.color;
    ctx.fillText(riderData.emoji + ' ' + riderData.tag + '  |  匹配度 ' + result.matchPercent + '%', W / 2, infoY + 30);
  }

  // 维度分析区域
  var dimY = imgY + imgH + 30;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = 'bold 22px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('性格维度分析', W / 2, dimY);

  // 绘制4个维度进度条
  var dims = [
    { label: '热情', labelA: '🔥热情洋溢', labelB: '🧊冷静内敛', percent: userE, colorA: '#E3001B', colorB: '#2C3E50' },
    { label: '理想', labelA: '🌈理想主义', labelB: '📐现实主义', percent: userN, colorA: '#8E44AD', colorB: '#2C3E50' },
    { label: '社交', labelA: '👥社交达人', labelB: '🎭独行侠', percent: userF, colorA: '#E74C3C', colorB: '#2C3E50' },
    { label: '行动', labelA: '⚡行动派', labelB: '📋计划派', percent: userP, colorA: '#E67E22', colorB: '#2C3E50' }
  ];

  var barStartY = dimY + 30;
  var barMargin = 55;
  var barX = 60;
  var barW = W - 120;
  var barH = 16;

  for (var d = 0; d < dims.length; d++) {
    var dim = dims[d];
    var y = barStartY + d * barMargin;

    // 标签
    ctx.font = '16px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = dim.colorA;
    ctx.fillText(dim.labelA, barX, y);
    ctx.textAlign = 'right';
    ctx.fillStyle = dim.colorB;
    ctx.fillText(dim.labelB, barX + barW, y);

    // 进度条背景
    var trackY = y + 8;
    ctx.fillStyle = '#e5e5ea';
    roundRect(ctx, barX, trackY, barW, barH, 8);
    ctx.fill();

    // 进度条填充（渐变）
    var fillW = Math.max(barH, barW * dim.percent / 100);
    var grad = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
    grad.addColorStop(0, dim.colorA);
    grad.addColorStop(1, dim.colorB);
    ctx.fillStyle = grad;
    roundRect(ctx, barX, trackY, fillW, barH, 8);
    ctx.fill();

    // 百分比
    ctx.fillStyle = '#86868b';
    ctx.font = 'bold 14px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(dim.percent + '%', W / 2, trackY + barH + 18);
  }

  // 经典台词
  var quoteY = barStartY + 4 * barMargin + 20;
  ctx.fillStyle = '#f5f5f7';
  roundRect(ctx, 40, quoteY, W - 80, 70, 12);
  ctx.fill();
  ctx.strokeStyle = '#E3001B';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(40, quoteY);
  ctx.lineTo(40, quoteY + 70);
  ctx.stroke();

  ctx.fillStyle = '#6e6e73';
  ctx.font = 'italic 16px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'left';
  // 截断过长的台词
  var quoteText = riderData.quote;
  if (quoteText.length > 30) {
    ctx.fillText('"' + quoteText.substring(0, 30) + '..."', 60, quoteY + 28);
    ctx.fillText(quoteText.substring(30), 60, quoteY + 52);
  } else {
    ctx.fillText('"' + quoteText + '"', 60, quoteY + 40);
  }

  // 性格描述（前60字）
  var descY = quoteY + 90;
  ctx.fillStyle = '#3a3a3c';
  ctx.font = '15px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'left';
  var descText = riderData.description;
  if (descText.length > 80) descText = descText.substring(0, 80) + '……';
  // 简单换行
  wrapText(ctx, descText, 50, descY, W - 100, 22);

  // 底部
  ctx.fillStyle = '#1d1d1f';
  ctx.fillRect(0, H - 50, W, 50);
  ctx.fillStyle = '#86868b';
  ctx.font = '14px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('假面骑士 KAMEN RIDER', W / 2, H - 20);

  // 导出图片
  try {
    var link = document.createElement('a');
    link.download = 'KRTI-' + riderData.riderEn + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    // 如果Canvas导出失败，显示提示
    alert('图片生成失败，请尝试截图保存。');
  }
}

// ==================== Canvas辅助：圆角矩形 ====================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ==================== Canvas辅助：文字换行 ====================
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  var chars = text.split('');
  var line = '';
  var lineY = y;
  for (var i = 0; i < chars.length; i++) {
    var testLine = line + chars[i];
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && line.length > 0) {
      ctx.fillText(line, x, lineY);
      line = chars[i];
      lineY += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, lineY);
}
